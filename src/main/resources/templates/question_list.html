<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<section>
    <div class="hero-banner">
        <h1>반도체 장비 Q&amp;A</h1>
        <p>장비 오류, 공정 이상, 설비 점검 관련 질문을 나누는 커뮤니티입니다.</p>
    </div>

    <div class="container">
        <p th:if="${param.logout}" class="alert alert-secondary mt-3 mb-0">로그아웃되었습니다.</p>
    </div>

    <div class="stat-row" th:unless="${#lists.isEmpty(questionList)}">
        <div class="stat-card">
            <div class="num" th:text="${#lists.size(questionList)}">0</div>
            <div class="label">전체 글</div>
        </div>
        <div class="stat-card stat-pending">
            <div class="num" th:text="${pendingCount}">0</div>
            <div class="label">답변 대기</div>
        </div>
        <div class="stat-card">
            <div class="num" th:text="${totalAnswers}">0</div>
            <div class="label">전체 답변</div>
        </div>
    </div>

    <div class="container my-3">
        <div class="page-header">
            <h2>게시글 목록</h2>
            <a th:href="@{/question/create}" class="btn btn-write"
               sec:authorize="isAuthenticated()">글쓰기</a>
            <a th:href="@{/member/login}" class="btn btn-outline-primary"
               sec:authorize="!isAuthenticated()">로그인 후 글쓰기</a>
        </div>

        <div th:if="${#lists.isEmpty(questionList)}" class="empty-state">
            <div class="icon">📋</div>
            <p>등록된 게시글이 없습니다.</p>
            <a th:href="@{/member/signup}" class="btn btn-write"
               sec:authorize="!isAuthenticated()">회원가입하고 첫 글 작성</a>
        </div>

        <table th:unless="${#lists.isEmpty(questionList)}"
               class="table table-board table-hover mb-0">
            <thead>
                <tr>
                    <th style="width: 7%">번호</th>
                    <th>제목</th>
                    <th style="width: 12%">작성자</th>
                    <th style="width: 16%">작성일</th>
                    <th style="width: 10%">상태</th>
                    <th style="width: 7%">답변</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="question, loop : ${questionList}">
                    <td class="text-muted" th:text="${loop.count}"></td>
                    <td>
                        <a th:href="@{|/question/detail/${question.id}|}"
                           th:text="${question.subject}"></a>
                    </td>
                    <td class="text-muted"
                        th:text="${question.author != null ? question.author.nickname : '알 수 없음'}"></td>
                    <td class="text-muted"
                        th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <span th:if="${visibleAnswerCounts[question.id] == 0}"
                              class="status-badge status-wait">답변대기</span>
                        <span th:unless="${visibleAnswerCounts[question.id] == 0}"
                              class="status-badge status-done">답변완료</span>
                    </td>
                    <td>
                        <span class="badge badge-answer rounded-pill"
                              th:classappend="${visibleAnswerCounts[question.id] == 0} ? 'zero' : ''"
                              th:text="${visibleAnswerCounts[question.id]}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
