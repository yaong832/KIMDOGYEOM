<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::section})}">
<section class="container my-3">
    <div class="detail-header">
        <span class="status-badge status-wait"
              th:if="${visibleAnswerCount == 0}">답변 대기</span>
        <span class="status-badge status-done"
              th:unless="${visibleAnswerCount == 0}">답변 완료</span>
        <h2 class="detail-title" th:text="${question.subject}"></h2>
    </div>

    <div class="card question-card my-3">
        <div class="card-body">
            <div class="post-meta mb-2">
                <span class="author-name"
                      th:text="${question.author != null ? question.author.nickname : '알 수 없음'}">작성자</span>
                <span class="date-badge"
                      th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></span>
            </div>
            <div class="card-text" style="white-space: pre-line;" th:text="${question.content}"></div>
            <div class="question-meta" sec:authorize="isAuthenticated()">
                <div class="btn-group-actions"
                     th:if="${#authorization.expression('hasRole(''ADMIN'')') or (question.author != null and question.author.username == authentication.name)}">
                    <a th:href="@{|/question/modify/${question.id}|}"
                       class="btn btn-sm btn-outline-secondary">수정</a>
                    <a th:href="@{|/question/delete/${question.id}|}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('정말 삭제하시겠습니까?');">삭제</a>
                </div>
                <a th:href="@{/question/list}" class="btn btn-sm btn-outline-primary">목록</a>
            </div>
            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/question/list}" class="btn btn-sm btn-outline-primary mt-2">목록</a>
            </div>
        </div>
    </div>

    <h5 class="answer-section-title">
        답변 <span class="answer-count" th:text="|${visibleAnswerCount}건|"></span>
    </h5>

    <div th:if="${visibleAnswerCount == 0 and (#lists.isEmpty(question.answerList) or !#authorization.expression('hasRole(''ADMIN'')'))}"
         class="empty-state py-4 mb-3">
        <p class="mb-0">아직 답변이 없습니다.</p>
    </div>

    <div th:each="answer : ${question.answerList}"
         th:if="${!answer.hidden or #authorization.expression('hasRole(''ADMIN'')')}"
         class="card answer-card"
         th:classappend="${answer.hidden} ? 'answer-hidden' : ''">
        <div class="card-body">
            <div class="answer-header">
                <div class="answer-author">
                    <span class="author-avatar"
                          th:text="${answer.author != null ? #strings.substring(answer.author.nickname,0,1) : '?'}">?</span>
                    <div>
                        <strong th:text="${answer.author != null ? answer.author.nickname : '알 수 없음'}">닉네임</strong>
                        <span class="author-role"
                              th:if="${answer.author != null and answer.author.role.name() == 'ADMIN'}">관리자</span>
                    </div>
                </div>
                <span th:if="${answer.hidden}" class="status-badge status-hidden"
                      sec:authorize="hasRole('ADMIN')">숨김</span>
            </div>

            <div th:unless="${answer.hidden}" class="card-text"
                 style="white-space: pre-line;" th:text="${answer.content}"></div>
            <div th:if="${answer.hidden}" class="hidden-notice" sec:authorize="hasRole('ADMIN')">
                관리자에 의해 숨김 처리된 답변입니다.
            </div>

            <div class="answer-footer">
                <span class="date-badge"
                      th:text="${#temporals.format(answer.createDate, 'yyyy-MM-dd HH:mm')}"></span>
                <div class="answer-tools"
                     sec:authorize="isAuthenticated()"
                     th:if="${#authorization.expression('hasRole(''ADMIN'')') or (answer.author != null and answer.author.username == authentication.name)}">
                    <a th:href="@{|/answer/modify/${answer.id}|}"
                       class="btn btn-sm btn-outline-secondary">수정</a>
                    <a th:href="@{|/answer/delete/${answer.id}|}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('답변을 삭제하시겠습니까?');">삭제</a>
                </div>
                <div sec:authorize="hasRole('ADMIN')">
                    <a th:unless="${answer.hidden}"
                       th:href="@{|/answer/hide/${answer.id}|}"
                       class="btn btn-sm btn-outline-warning"
                       onclick="return confirm('이 답변을 숨김 처리하시겠습니까?');">숨김</a>
                    <a th:if="${answer.hidden}"
                       th:href="@{|/answer/unhide/${answer.id}|}"
                       class="btn btn-sm btn-outline-success">숨김해제</a>
                </div>
            </div>
        </div>
    </div>

    <div class="answer-form-card" sec:authorize="isAuthenticated()">
        <label for="content" class="form-label">답변 작성</label>
        <form th:action="@{|/answer/create/${question.id}|}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <textarea name="content" id="content" rows="5" class="form-control mb-2"
                      placeholder="답변을 입력하세요" required></textarea>
            <button type="submit" class="btn btn-primary">답변 등록</button>
        </form>
    </div>

    <div class="login-prompt" sec:authorize="!isAuthenticated()">
        <p>답변을 작성하려면 <a th:href="@{/member/login}">로그인</a>이 필요합니다.</p>
    </div>
</section>
</html>
