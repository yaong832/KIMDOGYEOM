<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<section class="container my-3 auth-box">
    <h2 class="form-page-title">회원가입</h2>
    <p class="text-muted mb-4">반도체 장비 Q&amp;A 게시판에 가입하고 질문과 답변에 참여하세요.</p>
    <p th:if="${error}" class="alert alert-danger" th:text="${error}"></p>

    <form th:action="@{/member/signup}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="username" class="form-label">아이디</label>
            <input type="text" name="username" id="username" class="form-control"
                   placeholder="영문·숫자 조합" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="nickname" class="form-label">닉네임</label>
            <input type="text" name="nickname" id="nickname" class="form-control"
                   placeholder="게시판에 표시될 이름" required>
        </div>
        <button type="submit" class="btn btn-primary">가입하기</button>
        <a th:href="@{/member/login}" class="btn btn-secondary">로그인</a>
    </form>
</section>
</html>
