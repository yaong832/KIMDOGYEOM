<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<section class="container my-3">
    <h2 class="form-page-title">질문 등록</h2>
    <p class="text-muted mb-4">반도체 장비 관련 궁금한 점을 질문해 주세요.</p>
    <form th:action="@{/question/create}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="subject" class="form-label">제목</label>
            <input type="text" name="subject" id="subject" class="form-control"
                   placeholder="예) 에칭 장비 가동 중 알람 발생" required>
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">내용</label>
            <textarea name="content" id="content" class="form-control" rows="10"
                      placeholder="장비명, 발생 시점, 오류 코드, 증상 등을 작성해 주세요." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">등록</button>
        <a th:href="@{/question/list}" class="btn btn-secondary">목록</a>
    </form>
</section>
</html>
