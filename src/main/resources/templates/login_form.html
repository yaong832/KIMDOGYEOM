<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::section})}">
<section class="container my-3 auth-box">
    <h2 class="form-page-title">로그인</h2>
    <p th:if="${param.signup}" class="alert alert-success">회원가입이 완료되었습니다. 로그인해 주세요.</p>
    <p th:if="${param.error}" class="alert alert-danger">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    <p th:if="${param.logout}" class="alert alert-secondary">로그아웃되었습니다.</p>

    <form th:action="@{/member/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="username" class="form-label">아이디</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">로그인</button>
        <a th:href="@{/member/signup}" class="btn btn-secondary">회원가입</a>
    </form>

    <div class="auth-hint mt-4">
        <small class="text-muted">관리자 테스트 계정: kimdogyeom / 1234</small>
    </div>
</section>
</html>
