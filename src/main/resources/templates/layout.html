<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" type="text/css" th:href="@{/bootstrap.min.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}">
    <title>Kimdogyeom Board - 반도체 장비 Q&amp;A</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-board mb-0">
        <div class="container-fluid page-wrap py-2">
            <a class="navbar-brand fw-bold" th:href="@{/question/list}">
                Kimdogyeom Board
                <span class="badge-sub d-none d-md-inline">반도체 장비 Q&amp;A</span>
            </a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <div class="member-nav" sec:authorize="isAuthenticated()">
                    <span class="member-nickname"
                          sec:authentication="principal.member.nickname">회원</span>
                    <span class="role-badge user" sec:authorize="hasRole('USER')">일반회원</span>
                    <span class="role-badge admin" sec:authorize="hasRole('ADMIN')">관리자</span>
                </div>
                <div class="navbar-nav flex-row gap-1">
                    <a class="nav-link" th:href="@{/question/list}">게시판</a>
                    <a class="nav-link btn-write px-3" th:href="@{/question/create}"
                       sec:authorize="isAuthenticated()">글쓰기</a>
                    <a class="nav-link" th:href="@{/member/login}"
                       sec:authorize="!isAuthenticated()">로그인</a>
                    <a class="nav-link" th:href="@{/member/signup}"
                       sec:authorize="!isAuthenticated()">회원가입</a>
                    <a class="nav-link" th:href="@{/member/logout}"
                       sec:authorize="isAuthenticated()">로그아웃</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-wrap">
        <div th:replace="${content}"></div>
    </div>

    <footer class="site-footer">
        <strong>Kimdogyeom Board</strong> · 반도체 장비 Q&amp;A 커뮤니티
        <div class="footer-sub">한국폴리텍대학 반도체융합캠퍼스 · 프레임워크활용심화</div>
    </footer>
</body>
</html>
